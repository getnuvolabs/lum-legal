<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lum — by Nuvo Labs</title>
<style>
  :root{ --bg:#16130e; --ink:#eae1d8; --dim:#9a8f7f; --gold:#f2c879; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{ background:var(--bg); color:var(--ink); min-height:100vh;
    display:grid; place-items:center; text-align:center;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background-image:
      radial-gradient(900px 500px at 80% -10%, #241c30 0%, rgba(36,28,48,0) 55%),
      radial-gradient(800px 460px at -10% 10%, #1c2230 0%, rgba(28,34,48,0) 50%);
    padding:32px; }
  .moon{ width:104px; height:104px; border-radius:50%; margin:0 auto 22px; display:block;
    box-shadow:0 0 60px rgba(242,200,121,.28); }
  h1{ font-size:30px; font-weight:800; letter-spacing:-.02em;
    background:linear-gradient(180deg,#ffe7c0,var(--gold));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent; }
  p{ color:var(--dim); margin:10px 0 26px; }
  .links{ display:flex; gap:14px; justify-content:center; flex-wrap:wrap; }
  a.btn{ display:inline-block; padding:13px 22px; border-radius:999px; text-decoration:none;
    font-weight:700; color:var(--bg); background:var(--gold); }
  a.ghost{ background:transparent; color:var(--gold); border:1px solid rgba(242,200,121,.5); }
  footer{ margin-top:30px; color:var(--dim); font-size:13px; }
  footer a{ color:var(--gold); }
</style>
</head>
<body>
  <main>
    <img class="moon" src="moons/moon_full.png" alt="Lum moon">
    <h1>Lum</h1>
    <p>A private, on-device cycle, mood &amp; symptom journal — by Nuvo Labs.</p>
    <div class="links">
      <a class="btn" href="privacy.html">Privacy Policy</a>
      <a class="btn ghost" href="guide.html">How to use Lum</a>
    </div>
    <footer>Questions? <a href="mailto:getnuvolabs@gmail.com">getnuvolabs@gmail.com</a></footer>
  </main>
</body>
</html>
